apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-despacho
  template:
    metadata:
      labels:
        app: front-despacho
    spec:
      containers:
      - name: front-despacho
        image: 586435708287.dkr.ecr.us-east-1.amazonaws.com/front-despacho:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: front-despacho-lb
spec:
  type: LoadBalancer
  selector:
    app: front-despacho
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80